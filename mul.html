<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>乘與除的關係</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh; }

    .nav { display: flex; justify-content: space-between; align-items: center;
           padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; }
    .nav a { font-size: 14px; color: #666; text-decoration: none; }
    .nav h2 { font-size: 16px; color: #333; font-weight: bold; }

    .wrap { max-width: 420px; margin: 0 auto; padding: 12px;
            display: flex; flex-direction: column; align-items: center; gap: 12px; }

    .tabs { display: flex; width: 100%; border-radius: 14px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(74,108,247,.10); }
    .tab { flex: 1; padding: 12px 8px; font-size: 15px; font-weight: bold;
           border: none; cursor: pointer; background: #fff; color: #bbb;
           -webkit-tap-highlight-color: transparent; }
    .tab.on { background: #4a6cf7; color: #fff; }

    .cv-wrap { background: #fff; border-radius: 16px; padding: 12px;
               box-shadow: 0 2px 10px rgba(74,108,247,.12); }
    canvas { display: block; }

    .eq-card { background: #fff; border-radius: 16px; padding: 16px 18px;
               box-shadow: 0 2px 10px rgba(74,108,247,.12); width: 100%; text-align: center; }
    .eq-line { display: flex; justify-content: center; align-items: baseline;
               gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .en { font-size: 40px; font-weight: bold; line-height: 1; }
    .eo { font-size: 30px; color: #ccc; }
    .eq { font-size: 40px; font-weight: bold; color: #ccc; }
    .desc { font-size: 16px; color: #555; line-height: 1.9; }
    .desc b { font-size: 21px; }

    .btns { display: flex; gap: 10px; width: 100%; }
    .btn { flex: 1; border: none; border-radius: 14px; font-size: 17px; font-weight: bold;
           padding: 14px 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn:active { opacity: .8; }
    .btn.pri { background: #4a6cf7; color: #fff; }
    .btn.sec { background: #e9ecef; color: #555; }
    .btn.go  { background: #51cf66; color: #fff; }
    .btn:disabled { background: #ddd !important; color: #aaa; cursor: default; }
  </style>
</head>
<body>

<div class="nav">
  <span></span>
  <h2>乘與除的關係</h2>
  <a href="inverse.html">發現規律 →</a>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab on" id="t0" onclick="goPhase(0)">✖ 乘法累積</button>
    <button class="tab"    id="t1" onclick="goPhase(1)">➗ 除法分組</button>
  </div>

  <div class="cv-wrap">
    <canvas id="cvs" width="300" height="300"></canvas>
  </div>

  <div class="eq-card">
    <div class="eq-line" id="eqLine"></div>
    <div class="desc"    id="desc"></div>
  </div>

  <div class="btns" id="btns"></div>
</div>

<script>
  // ── Constants ─────────────────────────────────────────────
  const ROWS = 7, COLS = 4, TOT = 28;
  const ORC = '#e06b00';   // orange  = per-group (被乘數 4)
  const OVC = '#7c3aed';   // purple  = group count (乘數/商 7)
  const OTC = '#2f9e44';   // green   = total (積 28)
  const GRAY = '#b0c0d8';  // unactivated dot colour

  // Canvas layout: grid left-of-centre to leave room for right-side labels
  const CW = 300, CH = 300;
  const CX = 128, CY = 150; // grid centre
  const DR = 14, SP = 36;   // dot radius, spacing

  const cvs = document.getElementById('cvs');
  const ctx  = cvs.getContext('2d');

  // ── Helpers ───────────────────────────────────────────────
  function gp(r, c) {
    return { x: CX + (c - (COLS - 1) / 2) * SP,
             y: CY + (r - (ROWS - 1) / 2) * SP };
  }
  function ease(t) { return 1 - Math.pow(1 - Math.min(1, t), 2); }

  function rowBg(r, color, a) {
    const p0 = gp(r, 0), p1 = gp(r, COLS - 1);
    ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(p0.x - DR - 8, p0.y - DR - 6,
                  (p1.x - p0.x) + (DR + 8) * 2, DR * 2 + 12, 10);
    ctx.fill(); ctx.restore();
  }

  function drawDot(r, c, color, alpha, scale) {
    const p = gp(r, c);
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.translate(p.x, p.y); ctx.scale(scale, scale);
    ctx.beginPath(); ctx.arc(0, 0, DR, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.fill();
    ctx.restore();
  }

  function sideLabel(r, text, color, alpha) {
    const p = gp(r, COLS - 1);
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = color; ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(text, p.x + DR + 10, p.y);
    ctx.restore();
  }

  function lerpColor(c1, c2, t) {
    const h = s => parseInt(s, 16);
    const r1 = h(c1.slice(1,3)), g1 = h(c1.slice(3,5)), b1 = h(c1.slice(5,7));
    const r2 = h(c2.slice(1,3)), g2 = h(c2.slice(3,5)), b2 = h(c2.slice(5,7));
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
  }

  // ── State ─────────────────────────────────────────────────
  let phase = 0;   // 0 = multiplication, 1 = division
  let step  = 0;   // rows shown (phase 0) or groups done (phase 1)
  let animating = false, raf = null;

  // ── Draw: multiplication ──────────────────────────────────
  // animRow = -1 → static render; otherwise that row is animating with progress t
  function drawMul(animRow, t) {
    ctx.clearRect(0, 0, CW, CH);
    for (let r = 0; r < ROWS; r++) {
      const isNew = (r === animRow);
      if (r >= step && !isNew) continue;   // not revealed yet

      const e = ease(t);
      rowBg(r, ORC, isNew ? e * 0.15 : 0.15);

      for (let c = 0; c < COLS; c++) {
        let sc = 1;
        if (isNew) {
          const lt = Math.max(0, (t - c / COLS * 0.35) / 0.65);
          sc = ease(Math.min(1, lt));
        }
        drawDot(r, c, ORC, 1, sc);
      }

      // Running total label: =4, =8, =12 …
      sideLabel(r, '=' + (r + 1) * COLS, OTC, isNew ? e : 1);
    }
  }

  // ── Draw: division ────────────────────────────────────────
  function drawDiv(animRow, t) {
    ctx.clearRect(0, 0, CW, CH);
    const e = ease(t);
    for (let r = 0; r < ROWS; r++) {
      const done  = (r < step);
      const isNew = (r === animRow);

      if (done) {
        rowBg(r, ORC, 0.13);
        for (let c = 0; c < COLS; c++) drawDot(r, c, ORC, 1, 1);
        sideLabel(r, '第' + (r + 1) + '組', ORC, 1);
      } else if (isNew) {
        rowBg(r, ORC, e * 0.13);
        for (let c = 0; c < COLS; c++)
          drawDot(r, c, lerpColor(GRAY, ORC, e), 0.4 + 0.6 * e, 1);
        sideLabel(r, '第' + (r + 1) + '組', ORC, Math.max(0, (t - 0.5) * 2));
      } else {
        // not yet grouped — show faded grey
        for (let c = 0; c < COLS; c++) drawDot(r, c, GRAY, 0.45, 1);
      }
    }
  }

  // ── Animation engine ──────────────────────────────────────
  function startAnim(animRow, drawFn, onDone) {
    if (raf) cancelAnimationFrame(raf);
    animating = true;
    const t0 = performance.now(), DUR = 600;
    function tick(ts) {
      const t = Math.min(1, (ts - t0) / DUR);
      drawFn(animRow, t);
      if (t < 1) raf = requestAnimationFrame(tick);
      else { animating = false; onDone(); }
    }
    raf = requestAnimationFrame(tick);
  }

  // ── User actions ──────────────────────────────────────────
  function doStep() {
    if (animating || step >= ROWS) return;
    const cur = step; step++;
    const df = phase === 0 ? drawMul : drawDiv;
    startAnim(cur, df, () => {
      phase === 0 ? drawMul(-1, 0) : drawDiv(-1, 0);
      updateUI();
    });
    updateUI();   // disable button immediately
  }

  function doReplay() {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    step = 0; animating = false;
    phase === 0 ? drawMul(-1, 0) : drawDiv(-1, 0);
    updateUI();
  }

  function goPhase(p) {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    phase = p; step = 0; animating = false;
    document.getElementById('t0').classList.toggle('on', p === 0);
    document.getElementById('t1').classList.toggle('on', p === 1);
    p === 0 ? drawMul(-1, 0) : drawDiv(-1, 0);
    updateUI();
  }

  // ── UI builder ────────────────────────────────────────────
  function N(v, c) { return `<span class="en" style="color:${c}">${v}</span>`; }
  function O(v)    { return `<span class="eo">${v}</span>`; }
  const Q = `<span class="eq">？</span>`;

  function updateUI() {
    const done  = step >= ROWS;
    const total = step * COLS;
    const rem   = TOT - total;

    const primBtn = `<button class="btn pri" onclick="doStep()" ${animating ? 'disabled' : ''}>`;
    const repBtn  = `<button class="btn sec" onclick="doReplay()" ${animating ? 'disabled' : ''}>`;

    if (phase === 0) {
      // Equation: 4 × N = 4N  (or ? when unknown)
      document.getElementById('eqLine').innerHTML =
        N(4, ORC) + O('×') + (step > 0 ? N(step, OVC) : Q) +
        O('=') + (step > 0 ? N(total, OTC) : Q);

      document.getElementById('desc').innerHTML =
        step === 0
          ? `一排有 <b style="color:${ORC}">4</b> 個<br>一排一排累積，看看最後有幾個？`
          : done
          ? `一次 <b style="color:${ORC}">4</b> 個，重複 <b style="color:${OVC}">7</b> 次<br>總共 <b style="color:${OTC}">28</b> 個！`
          : `一次 <b style="color:${ORC}">4</b> 個，重複了 <b style="color:${OVC}">${step}</b> 次<br>目前共 <b style="color:${OTC}">${total}</b> 個`;

      document.getElementById('btns').innerHTML = done
        ? `${repBtn}↺ 再看一次</button>
           <button class="btn go" onclick="goPhase(1)">➗ 除法 →</button>`
        : `${primBtn}出現第 ${step + 1} 排 →</button>${repBtn}↺ 重看</button>`;

    } else {
      // Equation: 28 ÷ 4 = N  (or ?)
      document.getElementById('eqLine').innerHTML =
        N(28, OTC) + O('÷') + N(4, ORC) + O('=') +
        (step > 0 ? N(step, OVC) : Q);

      document.getElementById('desc').innerHTML =
        step === 0
          ? `共 <b style="color:${OTC}">28</b> 個，每次圈走 <b style="color:${ORC}">4</b> 個<br>要圈幾次才能全部圈完？`
          : done
          ? `每次 <b style="color:${ORC}">4</b> 個，圈了 <b style="color:${OVC}">7</b> 次<br>恰好全部圈完！`
          : `已圈走 <b style="color:${OVC}">${step}</b> 次，每次 <b style="color:${ORC}">4</b> 個<br>還剩 <b style="color:#666">${rem}</b> 個沒圈`;

      document.getElementById('btns').innerHTML = done
        ? `${repBtn}↺ 再看一次</button>
           <button class="btn sec" onclick="goPhase(0)">✖ 乘法 ←</button>`
        : `${primBtn}圈走第 ${step + 1} 組 →</button>${repBtn}↺ 重看</button>`;
    }
  }

  // ── Init ──────────────────────────────────────────────────
  drawMul(-1, 0);
  updateUI();
</script>
</body>
</html>
