<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>乘與除的關係</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh; }

    .nav { display: flex; justify-content: space-between; align-items: center;
           padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; }
    .nav a { font-size: 14px; color: #666; text-decoration: none; }
    .nav h2 { font-size: 16px; color: #333; font-weight: bold; }

    .act-bar { display: flex; background: #fff; border-bottom: 2px solid #e8eeff;
               overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .act-bar::-webkit-scrollbar { display: none; }
    .act-btn { flex: 1; min-width: 72px; padding: 8px 4px 7px; border: none;
               background: transparent; font-size: 12px; font-weight: bold;
               color: #999; cursor: pointer; text-decoration: none;
               display: flex; flex-direction: column; align-items: center; gap: 2px;
               border-bottom: 3px solid transparent; transition: color .15s, border-color .15s;
               -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .act-btn .act-icon { font-size: 16px; }
    .act-btn:hover { color: #4a6cf7; }
    .act-btn.act-on { color: #4a6cf7; border-bottom-color: #4a6cf7; background: #f5f7ff; }

    .wrap { max-width: 680px; margin: 0 auto; padding: 12px;
            display: flex; flex-direction: column; gap: 12px; }

    .ptabs { display: flex; border-radius: 14px; overflow: hidden;
             box-shadow: 0 2px 8px rgba(74,108,247,.10); }
    .ptab { flex: 1; padding: 12px 8px; font-size: 15px; font-weight: bold; border: none;
            cursor: pointer; background: #fff; color: #bbb;
            -webkit-tap-highlight-color: transparent; transition: background .2s, color .2s; }
    .ptab.on { background: #4a6cf7; color: #fff; }

    .main { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
    @media (min-width: 560px) {
      .main { flex-direction: row; align-items: flex-start; }
      .panel { flex: 1; min-width: 0; }
    }

    .cv-wrap { background: #fff; border-radius: 16px; padding: 12px;
               box-shadow: 0 2px 10px rgba(74,108,247,.12); flex-shrink: 0; }
    canvas { display: block; }

    .panel { display: flex; flex-direction: column; gap: 10px; width: 100%; }

    .gtabs { display: flex; gap: 8px; }
    .gtab { flex: 1; padding: 10px 8px; font-size: 14px; font-weight: bold;
            border: 2px solid #dde3ff; border-radius: 12px; cursor: pointer;
            background: #fff; color: #999; text-align: center; line-height: 1.5;
            -webkit-tap-highlight-color: transparent; transition: all .15s; }
    .gtab:active { opacity: .8; }
    .gtab.on { border-color: #4a6cf7; background: #eef0ff; color: #4a6cf7; }

    .disc { background: #fffbdd; border: 2px solid #ffd43b; border-radius: 12px;
            padding: 10px 14px; font-size: 14px; color: #5a4300; text-align: center;
            display: none; line-height: 1.7; }
    .disc.on { display: block; }

    .eq-card { background: #fff; border-radius: 16px; padding: 14px 16px;
               box-shadow: 0 2px 10px rgba(74,108,247,.12); text-align: center; }
    .eq-line { display: flex; justify-content: center; align-items: baseline;
               gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .en { font-size: 38px; font-weight: bold; line-height: 1; }
    .eo { font-size: 28px; color: #ccc; }
    .eq { font-size: 38px; font-weight: bold; color: #ccc; }
    .desc { font-size: 15px; color: #555; line-height: 1.9; }
    .desc b { font-size: 20px; }

    .btns { display: flex; gap: 10px; }
    .btn { flex: 1; border: none; border-radius: 14px; font-size: 16px; font-weight: bold;
           padding: 13px 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn:active { opacity: .8; }
    .btn.pri { background: #4a6cf7; color: #fff; }
    .btn.sec { background: #e9ecef; color: #555; }
    .btn.go  { background: #51cf66; color: #fff; }
    .btn:disabled { background: #ddd !important; color: #aaa; cursor: default; }
  </style>
</head>
<body>

<div class="nav">
  <span></span>
  <h2>乘與除的關係</h2>
  <span></span>
</div>
<nav class="act-bar">
  <a class="act-btn act-on" href="mul.html"><span class="act-icon">🔵</span>乘除關係</a>
  <a class="act-btn" href="machine.html"><span class="act-icon">⚙️</span>倍機器</a>
  <a class="act-btn" href="bridge.html"><span class="act-icon">🌉</span>機器到算式</a>
  <a class="act-btn" href="inverse.html"><span class="act-icon">🔍</span>互逆發現</a>
  <a class="act-btn" href="unknown.html"><span class="act-icon">□</span>找□的數</a>
</nav>

<div class="wrap">
  <div class="ptabs">
    <button class="ptab on" id="pt0" onclick="goPhase('mul')">✖ 乘法</button>
    <button class="ptab"    id="pt1" onclick="goPhase('div')">➗ 除法</button>
  </div>

  <div class="main">
    <div class="cv-wrap">
      <canvas id="cvs" width="300" height="310"></canvas>
    </div>
    <div class="panel">
      <div class="gtabs" id="gtabs"></div>
      <div class="disc"  id="disc"></div>
      <div class="eq-card">
        <div class="eq-line" id="eqLine"></div>
        <div class="desc"    id="desc"></div>
      </div>
      <div class="btns" id="btns"></div>
    </div>
  </div>
</div>

<script>
  // ── Grid constants (always 7 rows × 4 cols = 28 dots) ─────
  const ROWS = 7, COLS = 4, TOT = 28;
  const DR = 14, SP = 36;
  const CW = 300, CH = 310;
  // Grid centre — slightly raised to leave bottom margin for column labels
  const CX = 128, CY = 147;

  const ORC = '#e06b00';  // orange = per-group / groupSize
  const OVC = '#7c3aed';  // purple = numGroups / quotient
  const OTC = '#2f9e44';  // green  = total
  const GRAY = '#aabbcc'; // dim colour

  const cvs = document.getElementById('cvs');
  const ctx  = cvs.getContext('2d');

  // ── State ─────────────────────────────────────────────────
  let phase     = 'mul';  // 'mul' | 'div'
  let groupSize = 4;      // 4 = row-mode (7 rows × 4)  |  7 = col-mode (4 cols × 7)
  let step      = 0;      // groups revealed (mul) or removed (div)
  let animating = false, raf = null;
  const mulDone = { 4: false, 7: false };

  // groups in current mode: gs=4 → ROWS=7 groups;  gs=7 → COLS=4 groups
  function nGroups() { return groupSize === 4 ? ROWS : COLS; }
  function ease(t)   { return 1 - Math.pow(1 - Math.min(1, t), 2); }

  // ── Canvas helpers ────────────────────────────────────────
  function gp(r, c) {
    return { x: CX + (c - (COLS-1)/2) * SP,
             y: CY + (r - (ROWS-1)/2) * SP };
  }

  // Horizontal row background strip
  function rowBg(r, color, a) {
    const p0 = gp(r,0), p1 = gp(r, COLS-1);
    ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(p0.x-DR-8, p0.y-DR-6, (p1.x-p0.x)+(DR+8)*2, DR*2+12, 10);
    ctx.fill(); ctx.restore();
  }

  // Vertical column background strip
  function colBg(c, color, a) {
    const p0 = gp(0,c), p1 = gp(ROWS-1, c);
    ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(p0.x-DR-5, p0.y-DR-8, DR*2+10, (p1.y-p0.y)+(DR+8)*2, 10);
    ctx.fill(); ctx.restore();
  }

  function dot(r, c, color, alpha, scale) {
    const p = gp(r, c);
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.translate(p.x, p.y); ctx.scale(scale, scale);
    ctx.beginPath(); ctx.arc(0, 0, DR, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    ctx.restore();
  }

  // Right-side label (for row mode)
  function rLabel(r, text, color, alpha) {
    const p = gp(r, COLS-1);
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = color; ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(text, p.x + DR + 8, p.y);
    ctx.restore();
  }

  // Bottom label (for column mode)
  function bLabel(c, text, color, alpha) {
    const p = gp(ROWS-1, c);
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = color; ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(text, p.x, p.y + DR + 7);
    ctx.restore();
  }

  function lerpC(c1, c2, t) {
    const h = s => parseInt(s, 16);
    const r1=h(c1.slice(1,3)), g1=h(c1.slice(3,5)), b1=h(c1.slice(5,7));
    const r2=h(c2.slice(1,3)), g2=h(c2.slice(3,5)), b2=h(c2.slice(5,7));
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
  }

  // ── Draw: Multiplication ──────────────────────────────────
  // Ghost (very dim) shows full grid immediately so students can see
  // the target shape; groups pop in orange one by one.
  function drawMul(animIdx, t) {
    ctx.clearRect(0, 0, CW, CH);

    // Ghost — full grid, very dim
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        dot(r, c, ORC, 0.12, 1);

    const e = ease(t);

    if (groupSize === 4) {
      // ── Row mode: rows appear top → bottom ──────────────
      for (let r = 0; r < ROWS; r++) {
        const isNew = (r === animIdx);
        if (r >= step && !isNew) continue;
        rowBg(r, ORC, isNew ? e * 0.15 : 0.15);
        for (let c = 0; c < COLS; c++) {
          let sc = 1;
          if (isNew) {
            const lt = Math.max(0, (t - c/COLS*0.4) / 0.6);
            sc = ease(Math.min(1, lt));
          }
          dot(r, c, ORC, 1, sc);
        }
        rLabel(r, '=' + (r+1)*COLS, OTC, isNew ? e : 1);
      }

    } else {
      // ── Column mode: columns appear left → right ─────────
      for (let c = 0; c < COLS; c++) {
        const isNew = (c === animIdx);
        if (c >= step && !isNew) continue;
        colBg(c, ORC, isNew ? e * 0.15 : 0.15);
        for (let r = 0; r < ROWS; r++) {
          let sc = 1;
          if (isNew) {
            const lt = Math.max(0, (t - r/ROWS*0.4) / 0.6);
            sc = ease(Math.min(1, lt));
          }
          dot(r, c, ORC, 1, sc);
        }
        bLabel(c, '=' + (c+1)*ROWS, OTC, isNew ? e : 1);
      }
    }
  }

  // ── Draw: Division ────────────────────────────────────────
  // All 28 dots start bright green (= the total pool).
  // Each step: one group dims to gray (= "taken away").
  function drawDiv(animIdx, t) {
    ctx.clearRect(0, 0, CW, CH);
    const e = ease(t);

    if (groupSize === 4) {
      // ── Row mode: dim rows top → bottom ──────────────────
      for (let r = 0; r < ROWS; r++) {
        const gone  = (r < step);
        const isNew = (r === animIdx);
        if (gone) {
          rowBg(r, GRAY, 0.07);
          for (let c = 0; c < COLS; c++) dot(r, c, GRAY, 0.28, 1);
          rLabel(r, '第'+(r+1)+'組', GRAY, 0.5);
        } else if (isNew) {
          rowBg(r, lerpC(OTC, GRAY, e), (1-e)*0.15 + e*0.07);
          for (let c = 0; c < COLS; c++)
            dot(r, c, lerpC(OTC, GRAY, e), 1 - 0.72*e, 1);
          rLabel(r, '第'+(r+1)+'組', lerpC(OTC, GRAY, e),
                 Math.max(0, (t-0.5)*2) * 0.5);
        } else {
          for (let c = 0; c < COLS; c++) dot(r, c, OTC, 1, 1);
        }
      }

    } else {
      // ── Column mode: dim columns left → right ────────────
      for (let c = 0; c < COLS; c++) {
        const gone  = (c < step);
        const isNew = (c === animIdx);
        if (gone) {
          colBg(c, GRAY, 0.07);
          for (let r = 0; r < ROWS; r++) dot(r, c, GRAY, 0.28, 1);
          bLabel(c, '第'+(c+1)+'組', GRAY, 0.5);
        } else if (isNew) {
          colBg(c, lerpC(OTC, GRAY, e), (1-e)*0.15 + e*0.07);
          for (let r = 0; r < ROWS; r++)
            dot(r, c, lerpC(OTC, GRAY, e), 1 - 0.72*e, 1);
          bLabel(c, '第'+(c+1)+'組', lerpC(OTC, GRAY, e),
                 Math.max(0, (t-0.5)*2) * 0.5);
        } else {
          for (let r = 0; r < ROWS; r++) dot(r, c, OTC, 1, 1);
        }
      }
    }
  }

  // ── Animation ─────────────────────────────────────────────
  function startAnim(animIdx, drawFn, onDone) {
    if (raf) cancelAnimationFrame(raf);
    animating = true;
    const t0 = performance.now(), DUR = 600;
    function tick(ts) {
      const t = Math.min(1, (ts - t0) / DUR);
      drawFn(animIdx, t);
      if (t < 1) raf = requestAnimationFrame(tick);
      else { animating = false; onDone(); }
    }
    raf = requestAnimationFrame(tick);
  }

  function staticDraw() {
    phase === 'mul' ? drawMul(-1, 0) : drawDiv(-1, 0);
  }

  // ── Actions ───────────────────────────────────────────────
  function doStep() {
    const ng = nGroups();
    if (animating || step >= ng) return;
    const cur = step; step++;
    const df = phase === 'mul' ? drawMul : drawDiv;
    startAnim(cur, df, () => {
      staticDraw();
      if (phase === 'mul' && step >= ng) mulDone[groupSize] = true;
      updateUI();
    });
    updateUI();
  }

  function doReplay() {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    step = 0; animating = false;
    staticDraw(); updateUI();
  }

  function goPhase(p) {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    phase = p; step = 0; animating = false;
    document.getElementById('pt0').classList.toggle('on', p === 'mul');
    document.getElementById('pt1').classList.toggle('on', p === 'div');
    staticDraw(); updateUI();
  }

  function setGroupSize(gs) {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    groupSize = gs; step = 0; animating = false;
    staticDraw(); updateUI();
  }

  // ── UI ────────────────────────────────────────────────────
  function N(v, c, fade) {
    return `<span class="en" style="color:${c};${fade?'opacity:.28;':'}'}">${v}</span>`;
  }
  function O(v) { return `<span class="eo">${v}</span>`; }
  const Q = `<span class="eq">？</span>`;

  function updateUI() {
    const ng    = nGroups();
    const pg    = groupSize;           // per-group = groupSize
    const done  = step >= ng;
    const total = step * pg;
    const rem   = TOT - total;

    // Grouping toggle labels differ by phase
    const g4on = groupSize === 4 ? 'on' : '';
    const g7on = groupSize === 7 ? 'on' : '';
    if (phase === 'mul') {
      document.getElementById('gtabs').innerHTML =
        `<button class="gtab ${g4on}" onclick="setGroupSize(4)">一次 4 個<br><small style="font-weight:normal">橫排，重複 7 次</small></button>` +
        `<button class="gtab ${g7on}" onclick="setGroupSize(7)">一次 7 個<br><small style="font-weight:normal">直行，重複 4 次</small></button>`;
    } else {
      document.getElementById('gtabs').innerHTML =
        `<button class="gtab ${g4on}" onclick="setGroupSize(4)">28 ÷ 4 = ?<br><small style="font-weight:normal">每次拿走一橫排</small></button>` +
        `<button class="gtab ${g7on}" onclick="setGroupSize(7)">28 ÷ 7 = ?<br><small style="font-weight:normal">每次拿走一直行</small></button>`;
    }

    // Discovery banner
    const disc = document.getElementById('disc');
    if (phase === 'mul' && mulDone[4] && mulDone[7]) {
      disc.className = 'disc on';
      disc.innerHTML =
        `發現了嗎？<b style="color:${ORC}">4×7</b> 和 <b style="color:${OVC}">7×4</b> 的答案都是 <b style="color:${OTC}">28</b>！<br>` +
        '橫著數、直著數，總數不變！';
    } else {
      disc.className = 'disc';
    }

    // Buttons
    const stepWord = pg === 4 ? '排' : '行';
    const stepAct  = phase === 'mul' ? '出現第' : '拿走第';
    const primBtn  = `<button class="btn pri" onclick="doStep()" ${animating?'disabled':''}>`;
    const repBtn   = `<button class="btn sec" onclick="doReplay()" ${animating?'disabled':''}>`;

    if (phase === 'mul') {
      document.getElementById('eqLine').innerHTML =
        N(pg, ORC) + O('×') + (step > 0 ? N(step, OVC) : Q) +
        O('=') + (step > 0 ? N(total, OTC, done) : Q);

      const otherGs = pg === 4 ? 7 : 4;
      document.getElementById('desc').innerHTML =
        step === 0
          ? `一${stepWord}有 <b style="color:${ORC}">${pg}</b> 個<br>一${stepWord}一${stepWord}累積，最後有幾個？`
          : done
          ? `一次 <b style="color:${ORC}">${pg}</b> 個，重複 <b style="color:${OVC}">${ng}</b> 次，共 <b style="color:${OTC}">28</b> 個！` +
            (!mulDone[otherGs]
              ? `<br><span style="color:#aaa;font-size:13px">換「一次 ${otherGs} 個」試試看！</span>`
              : '')
          : `一次 <b style="color:${ORC}">${pg}</b> 個，重複了 <b style="color:${OVC}">${step}</b> 次<br>目前共 <b style="color:${OTC}">${total}</b> 個`;

      document.getElementById('btns').innerHTML = done
        ? `${repBtn}↺ 再看一次</button><button class="btn go" onclick="goPhase('div')">➗ 除法 →</button>`
        : `${primBtn}${stepAct} ${step+1} ${stepWord} →</button>${repBtn}↺ 重看</button>`;

    } else {
      document.getElementById('eqLine').innerHTML =
        N(TOT, OTC) + O('÷') + N(pg, ORC) + O('=') +
        (step > 0 ? N(step, OVC) : Q);

      document.getElementById('desc').innerHTML =
        step === 0
          ? `共 <b style="color:${OTC}">${TOT}</b> 個，每次拿走 <b style="color:${ORC}">${pg}</b> 個（一${stepWord}）<br>要拿幾次才能全部拿完？`
          : done
          ? `每次 <b style="color:${ORC}">${pg}</b> 個，拿了 <b style="color:${OVC}">${ng}</b> 次<br>恰好全部拿完！`
          : `已拿走 <b style="color:${OVC}">${step}</b> 次，每次 <b style="color:${ORC}">${pg}</b> 個<br>還剩 <b style="color:${OTC}">${rem}</b> 個`;

      document.getElementById('btns').innerHTML = done
        ? `${repBtn}↺ 再看一次</button><button class="btn sec" onclick="goPhase('mul')">✖ 乘法 ←</button>`
        : `${primBtn}${stepAct} ${step+1} ${stepWord} →</button>${repBtn}↺ 重看</button>`;
    }
  }

  // ── Init ──────────────────────────────────────────────────
  drawMul(-1, 0);
  updateUI();
</script>
</body>
</html>
