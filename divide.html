<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>除法應用題分析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh;
           -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    .nav { display: flex; justify-content: space-between; align-items: center;
           padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; }
    .nav a { font-size: 14px; color: #666; text-decoration: none; }
    .nav span { width: 60px; }
    .nav h2 { font-size: 16px; color: #333; font-weight: bold; }

    .act-bar { display: flex; background: #fff; border-bottom: 2px solid #e8eeff;
               overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .act-bar::-webkit-scrollbar { display: none; }
    .act-btn { flex: 1; min-width: 60px; padding: 8px 4px 7px; border: none;
               background: transparent; font-size: 11px; font-weight: bold; color: #999;
               cursor: pointer; text-decoration: none;
               display: flex; flex-direction: column; align-items: center; gap: 2px;
               border-bottom: 3px solid transparent; transition: color .15s, border-color .15s;
               white-space: nowrap; }
    .act-btn .act-icon { font-size: 15px; }
    .act-btn.act-on { color: #0c8599; border-bottom-color: #0c8599; background: #e3fafc; }

    .wrap { max-width: 600px; margin: 0 auto; padding: 14px 12px;
            display: flex; flex-direction: column; gap: 12px; }

    /* ── Group selector ── */
    .group-bar { display: flex; gap: 6px; flex-wrap: wrap; }
    .gp { border: 2px solid #dde3ff; background: #fff; border-radius: 20px;
          padding: 6px 14px; font-size: 14px; font-weight: bold; color: #888;
          cursor: pointer; -webkit-tap-highlight-color: transparent;
          transition: all .15s; }
    .gp:active { opacity: .8; }
    .gp.on { background: #0c8599; border-color: #0c8599; color: #fff; }

    .prog-row { display: flex; align-items: center; gap: 10px; }
    .prog-label { font-size: 13px; color: #888; white-space: nowrap; }
    .prog-track { flex: 1; height: 6px; background: #dde3ff; border-radius: 3px; }
    .prog-fill  { height: 100%; background: #0c8599; border-radius: 3px; transition: width .4s; }

    /* Main card */
    .main-card { background: #fff; border-radius: 20px;
                 box-shadow: 0 2px 16px rgba(12,133,153,.12); padding: 20px 18px;
                 display: flex; flex-direction: column; gap: 18px; }

    .problem-text { font-size: 17px; line-height: 1.9; color: #333;
                    padding-bottom: 14px; border-bottom: 1px dashed #e0e0e0; }

    .phase-q { font-size: 14px; font-weight: bold; color: #666; text-align: center; }

    /* ── Card pool ── */
    .card-pool { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
                 min-height: 52px; }

    .qty-card { border: 2px solid #a5d8ff; border-radius: 12px; padding: 10px 14px;
                font-size: 16px; font-weight: bold; color: #555; cursor: pointer;
                background: #f0f8ff; transition: all .2s; text-align: center;
                user-select: none; line-height: 1.4; }
    .qty-card:active { transform: scale(.95); }
    .qty-card.selected { border-color: #e06b00; background: #fff3e6; color: #e06b00;
                          box-shadow: 0 0 0 3px rgba(224,107,0,.18); }
    .qty-card.gone { visibility: hidden; pointer-events: none; }
    .qty-card.err  { animation: shake .3s ease; }

    /* ── Equation zones ── */
    .eq-zones { display: flex; align-items: center; justify-content: center;
                gap: 6px; flex-wrap: wrap; }

    .zone-group { display: flex; flex-direction: column; align-items: center; gap: 5px;
                  flex: 1; min-width: 80px; max-width: 140px; }

    .zone-lbl { font-size: 11px; font-weight: bold; padding: 4px 6px; border-radius: 10px;
                text-align: center; line-height: 1.4; width: 100%; }
    .zone-lbl.dividend { background: #dbe4ff; color: #4263eb; }
    .zone-lbl.divisor  { background: #d3f9d8; color: #2f9e44; }
    .zone-lbl.quotient { background: #ffe8cc; color: #e06b00; }

    .zone-slot { width: 100%; min-height: 58px; border: 2px dashed #ddd; border-radius: 12px;
                 display: flex; align-items: center; justify-content: center;
                 font-size: 15px; font-weight: bold; color: #bbb;
                 transition: border-color .2s, background .2s;
                 background: #fafafa; padding: 6px; text-align: center; line-height: 1.3; }
    .zone-slot.active-zone { border-color: #0c8599; border-style: dashed; cursor: pointer;
                              animation: pulseZ 1.4s ease-in-out infinite; }
    .zone-slot.inactive-zone { opacity: .3; pointer-events: none; cursor: default; }
    .zone-slot.locked-dividend { border-color: #4263eb; border-style: solid; background: #f0f4ff;
                                  color: #4263eb; pointer-events: none;
                                  animation: popIn .35s cubic-bezier(.17,.67,.44,1.4); }
    .zone-slot.locked-divisor  { border-color: #2f9e44; border-style: solid; background: #f3fdf5;
                                  color: #2f9e44; pointer-events: none;
                                  animation: popIn .35s cubic-bezier(.17,.67,.44,1.4); }
    .zone-slot.locked-quotient { border-color: #e06b00; border-style: solid; background: #fff8f0;
                                  color: #e06b00; pointer-events: none;
                                  animation: popIn .35s cubic-bezier(.17,.67,.44,1.4); }
    .zone-slot.err { animation: shake .3s ease; border-color: #ff6b6b !important; }

    @keyframes pulseZ {
      0%,100% { box-shadow: 0 0 0 0 rgba(12,133,153,.35); }
      50%      { box-shadow: 0 0 0 8px rgba(12,133,153,.0); }
    }

    /* Step prompt */
    .step-prompt { font-size: 14px; font-weight: bold; text-align: center;
                   padding: 8px 14px; border-radius: 10px; transition: all .3s; }
    .step-prompt.s0 { background: #dbe4ff; color: #4263eb; }
    .step-prompt.s1 { background: #d3f9d8; color: #2f9e44; }
    .step-prompt.s2 { background: #ffe8cc; color: #e06b00; }

    .eq-sym { font-size: 28px; color: #aaa; font-weight: bold; flex-shrink: 0;
              padding-top: 22px; }

    /* ── Equation reveal ── */
    .eq-reveal { text-align: center; display: none; padding: 4px 0; }
    .eq-reveal.show { display: block; animation: fadeUp .4s ease; }
    .eq-formal { font-size: 22px; font-weight: bold; color: #0c8599; margin-bottom: 5px; }
    .eq-hint   { font-size: 13px; color: #888; }

    /* Next button */
    .next-btn { border: none; border-radius: 14px; background: #0c8599; color: #fff;
                font-size: 18px; font-weight: bold; padding: 13px; cursor: pointer;
                display: none; width: 100%; }
    .next-btn.show { display: block; animation: fadeUp .4s ease; }
    .next-btn:active { opacity: .85; }

    /* Done */
    .done-banner { background: #fff; border-radius: 24px; padding: 36px 24px;
                   box-shadow: 0 4px 24px rgba(12,133,153,.18); text-align: center; display: none; }
    .done-banner.show { display: block; animation: fadeUp .5s ease; }
    .done-star  { font-size: 52px; margin-bottom: 10px; animation: popIn .5s cubic-bezier(.17,.67,.44,1.4); }
    .done-title { font-size: 26px; font-weight: bold; color: #2f9e44; margin-bottom: 6px; }
    .done-group { display: inline-block; background: #e3fafc; color: #0c8599;
                  font-size: 14px; font-weight: bold; border-radius: 20px;
                  padding: 4px 14px; margin-bottom: 16px; }
    .done-sub   { font-size: 15px; color: #666; line-height: 1.8; margin-bottom: 24px; }
    .done-btns  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .done-btn   { border: none; border-radius: 14px; font-size: 16px; font-weight: bold;
                  padding: 13px 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .done-btn.retry { background: #0c8599; color: #fff; }
    .done-btn.next  { background: #e3fafc; color: #0c8599; }

    mark.hl { background: #fff3b0; color: inherit; border-radius: 3px;
              padding: 0 2px; font-style: normal; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
             background: rgba(0,0,0,.72); color: #fff; padding: 10px 22px;
             border-radius: 20px; font-size: 15px; font-weight: bold;
             opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }

    @keyframes popIn {
      0%   { transform: scale(.88); opacity: .6; }
      65%  { transform: scale(1.06); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-10px); }
      75%     { transform: translateX(10px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<div class="wrap">
  <!-- Group selector -->
  <div class="group-bar" id="groupBar"></div>

  <div class="prog-row">
    <span class="prog-label" id="progLabel">1 / 5</span>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="main-card" id="mainCard">
    <div class="problem-text" id="problemText"></div>

    <div class="step-prompt" id="stepPrompt"></div>

    <!-- Card pool -->
    <div class="card-pool" id="cardPool"></div>

    <!-- Equation zones -->
    <div class="eq-zones">
      <div class="zone-group">
        <div class="zone-lbl dividend">被除數</div>
        <div class="zone-slot" id="zs-dividend" onclick="zoneClick('dividend')"></div>
      </div>
      <div class="eq-sym">÷</div>
      <div class="zone-group">
        <div class="zone-lbl divisor">除數</div>
        <div class="zone-slot" id="zs-divisor" onclick="zoneClick('divisor')"></div>
      </div>
      <div class="eq-sym">=</div>
      <div class="zone-group">
        <div class="zone-lbl quotient">商</div>
        <div class="zone-slot" id="zs-quotient" onclick="zoneClick('quotient')"></div>
      </div>
    </div>

    <!-- Equation reveal (after correct match) -->
    <div class="eq-reveal" id="eqReveal">
      <div class="eq-formal" id="eqFormal"></div>
      <div class="eq-hint"   id="eqHint"></div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextProblem()"></button>
  </div>

  <div class="done-banner" id="doneBanner">
    <div class="done-star">🏆</div>
    <div class="done-title">五題全過關！</div>
    <div class="done-group" id="doneGroup"></div>
    <div class="done-sub">
      被除數 ÷ 除數 = 商<br>
      掌握這三個角色，除法應用題就難不倒你！
    </div>
    <div class="done-btns">
      <button class="done-btn retry" onclick="initGroup()">再挑戰一次</button>
      <button class="done-btn next"  onclick="goNextGroup()">換下一組 →</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

    cards:[{label:'238顆',role:'dividend'},{label:'7天',role:'divisor'},{label:'？顆',role:'quotient'}],
    dv:238, dr:7, qt:34, rt:'quotient' },
  { text:'媽媽整理全家人的襪子，把每8雙裝成一盒，剛好可以裝成7盒，全家人共有幾雙襪子？',
    cards:[{label:'？雙',role:'dividend'},{label:'8雙',role:'divisor'},{label:'7盒',role:'quotient'}],
    dv:56, dr:8, qt:7, rt:'dividend' },
];

// ── Group state ──────────────────────────────────────────
const GROUP_SIZE = 5;
const NUM_GROUPS = Math.ceil(PROBLEMS.length / GROUP_SIZE); // 6

let curGroup = 0;
let groupProbs = [];

function buildGroupBar() {
  const bar = document.getElementById('groupBar');
  bar.innerHTML = '';
  for (let g = 0; g < NUM_GROUPS; g++) {
    const start = g * GROUP_SIZE + 1;
    const end   = Math.min(start + GROUP_SIZE - 1, PROBLEMS.length);
    const btn = document.createElement('button');
    btn.className = 'gp' + (g === curGroup ? ' on' : '');
    btn.textContent = start + '–' + end;
    btn.onclick = () => { curGroup = g; initGroup(); };
    btn.id = 'gp-' + g;
    bar.appendChild(btn);
  }
}

function refreshGroupBar() {
  document.querySelectorAll('.gp').forEach((b, i) => {
    b.classList.toggle('on', i === curGroup);
  });
}

function initGroup() {
  const start = curGroup * GROUP_SIZE;
  groupProbs = shuffle(PROBLEMS.slice(start, start + GROUP_SIZE));
  cur = 0;
  refreshGroupBar();
  loadProblem();
}

// ── Step config ───────────────────────────────────────────
const STEP_ORDER  = ['dividend', 'divisor', 'quotient'];
const STEP_LABELS = [
  '第 1 步：哪個是「被除數」？',
  '第 2 步：哪個是「除數」？',
  '第 3 步：哪個是「商」？',
];

// ── Problem state ─────────────────────────────────────────
let cur      = 0;
let step     = 0;
let shuffled = [];
let selCard  = null;
let done     = false;
let currentP = null;

// ── Helpers ───────────────────────────────────────────────
function shuffle(arr) {
  const a = arr.map(c => Object.assign({}, c));
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function cardHTML(c) {
  let h = c.label;
  if (c.note) h += '<br><small style="font-size:11px;color:#999">（' + c.note + '）</small>';
  return h;
}

// ── Text highlight ────────────────────────────────────────
function buildHighlightedText(p, card) {
  const text = p.text;
  if (card.role === 'decoy') return text;

  const ranges = [];
  const addRange = (re) => {
    const m = re.exec(text);
    if (m) ranges.push([m.index, m.index + m[0].length]);
  };

  if (card.label.includes('？')) {
    addRange(/[^，。！？]*？$/);
  } else {
    const nums = card.note
      ? (card.note.match(/\d+/g) || [])
      : [(card.label.match(/\d+/) || [])[0]].filter(Boolean);
    nums.forEach(num => {
      addRange(new RegExp('[^，。！？]*(?<!\\d)' + num + '(?!\\d)[^，。！？]*'));
    });
  }

  if (ranges.length === 0) return text;

  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [ranges[0].slice()];
  for (let i = 1; i < ranges.length; i++) {
    const last = merged[merged.length - 1];
    if (ranges[i][0] <= last[1]) last[1] = Math.max(last[1], ranges[i][1]);
    else merged.push(ranges[i].slice());
  }

  let html = '', pos = 0;
  merged.forEach(([s, e]) => {
    html += text.slice(pos, s) + '<mark class="hl">' + text.slice(s, e) + '</mark>';
    pos = e;
  });
  return html + text.slice(pos);
}

function highlightFor(card) {
  if (!currentP) return;
  document.getElementById('problemText').innerHTML = buildHighlightedText(currentP, card);
}

function clearHighlight() {
  if (!currentP) return;
  document.getElementById('problemText').textContent = currentP.text;
}

// 干擾牌：答案數值 + 未知數的單位
function makeDecoy(p) {
  const ans = p.rt === 'dividend' ? p.dv : p.rt === 'divisor' ? p.dr : p.qt;
  const unknownCard = p.cards.find(c => c.label.includes('？'));
  const unit = unknownCard ? unknownCard.label.replace('？', '') : '';
  return { label: ans + unit, role: 'decoy' };
}

// ── Load problem ──────────────────────────────────────────
function loadProblem() {
  const p = groupProbs[cur];
  currentP = p;
  done = false; step = 0; selCard = null;

  const total = groupProbs.length;
  document.getElementById('progLabel').textContent = (cur + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = (cur / total * 100) + '%';
  document.getElementById('problemText').textContent = p.text;
  document.getElementById('mainCard').style.display = '';
  document.getElementById('doneBanner').className = 'done-banner';

  STEP_ORDER.forEach(r => {
    const s = document.getElementById('zs-' + r);
    s.innerHTML = '';
    s.className = 'zone-slot';
  });

  const decoy = makeDecoy(p);
  shuffled = shuffle([...p.cards, decoy]);

  const pool = document.getElementById('cardPool');
  pool.innerHTML = shuffled.map((c, i) =>
    '<div class="qty-card" data-i="' + i + '" onclick="cardClick(this)">' + cardHTML(c) + '</div>'
  ).join('');

  document.getElementById('eqReveal').className = 'eq-reveal';
  document.getElementById('nextBtn').className = 'next-btn';

  updateStepUI();
}

// ── Step UI ───────────────────────────────────────────────
function updateStepUI() {
  const prompt = document.getElementById('stepPrompt');
  prompt.textContent = STEP_LABELS[step];
  prompt.className = 'step-prompt s' + step;

  STEP_ORDER.forEach((r, i) => {
    const slot = document.getElementById('zs-' + r);
    if (slot.classList.contains('locked-' + r)) return;
    slot.className = 'zone-slot ' + (i === step ? 'active-zone' : 'inactive-zone');
  });
}

// ── Card click ────────────────────────────────────────────
function cardClick(el) {
  if (el.classList.contains('gone') || done) return;
  if (selCard && selCard.el === el) {
    el.classList.remove('selected');
    selCard = null;
    clearHighlight();
    return;
  }
  document.querySelectorAll('.qty-card').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selCard = { el, card: shuffled[parseInt(el.dataset.i)] };
  highlightFor(selCard.card);
}

// ── Zone click (sequential) ───────────────────────────────
function zoneClick(role) {
  if (done || !selCard) return;
  if (role !== STEP_ORDER[step]) return;

  const slot = document.getElementById('zs-' + role);
  const card = selCard.card;
  selCard.el.classList.remove('selected');

  if (card.role === role) {
    // ✓ Correct
    selCard.el.classList.add('gone');
    selCard = null;
    clearHighlight();
    slot.innerHTML = cardHTML(card);
    slot.className = 'zone-slot locked-' + role;
    step++;
    if (step >= STEP_ORDER.length) {
      done = true;
      setTimeout(showEquation, 400);
    } else {
      updateStepUI();
    }
  } else {
    // ✗ Wrong card → go back to previous problem
    selCard = null;
    clearHighlight();
    slot.innerHTML = cardHTML(card);
    slot.className = 'zone-slot err';
    const isFirst = cur === 0;
    showToast(isFirst ? '答錯了，重新來過！' : '答錯了，退回上一題！');
    setTimeout(() => {
      if (!isFirst) cur--;
      loadProblem();
    }, 900);
  }
}

// ── Show equation after all 3 steps correct ───────────────
function showEquation() {
  const p = groupProbs[cur];
  document.getElementById('eqFormal').textContent = p.dv + ' ÷ ' + p.dr + ' = ' + p.qt + ' ✓';
  document.getElementById('eqHint').textContent = '乘法驗算：' + p.qt + ' × ' + p.dr + ' = ' + p.dv;
  document.getElementById('eqReveal').className = 'eq-reveal show';
  const btn = document.getElementById('nextBtn');
  btn.textContent = cur < groupProbs.length - 1 ? '下一題 →' : '完成！🎉';
  btn.className = 'next-btn show';
}

// ── Next problem ──────────────────────────────────────────
function nextProblem() {
  cur++;
  if (cur >= groupProbs.length) {
    const start = curGroup * GROUP_SIZE + 1;
    const end   = Math.min(start + GROUP_SIZE - 1, PROBLEMS.length);
    document.getElementById('doneGroup').textContent = '第 ' + start + '–' + end + ' 題';
    document.getElementById('mainCard').style.display = 'none';
    document.getElementById('doneBanner').className = 'done-banner show';
    document.getElementById('progFill').style.width = '100%';
    document.getElementById('progLabel').textContent = groupProbs.length + ' / ' + groupProbs.length;
  } else {
    loadProblem();
  }
}

function goNextGroup() {
  curGroup = (curGroup + 1) % NUM_GROUPS;
  initGroup();
}

let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 1800);
}

buildGroupBar();
initGroup();
</script>
</body>
</html>
